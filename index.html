<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Feedback Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f2f5;
        }
        .whatsapp-green {
            background-color: #25D366;
        }
        .whatsapp-dark {
            background-color: #075E54;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="whatsapp-dark p-6 text-white text-center">
            <h1 class="text-2xl font-bold mb-2">WhatsApp Feedback Tool</h1>
            <p class="text-sm opacity-90">  shady</p>
        </div>

        <div class="p-6 space-y-6">
            <!-- Message Input -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">نص الرسالة (الفيدباك):</label>
                <textarea id="feedbackMessage" rows="4" 
                    class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none transition-all"
                    placeholder="اكتب هنا الرسالة التي تريد إرسالها للجميع..."></textarea>
            </div>

            <!-- Numbers Input -->
            <div>
                <label class="block text-gray-700 font-bold mb-2">أرقام الهواتف (رقم في كل سطر):</label>
                <p class="text-xs text-gray-500 mb-2">* تأكد من إضافة كود الدولة (مثلاً: 968...)</p>
                <textarea id="phoneNumbers" rows="6" 
                    class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-green-500 focus:outline-none transition-all font-mono"
                    placeholder="968000000000&#10;968111111111&#10;9668222222222"></textarea>
            </div>

            <!-- Generate Button -->
            <button onclick="generateList()" 
                class="w-full whatsapp-green hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95">
                تحديث قائمة الإرسال
            </button>

            <!-- Results Section -->
            <div id="resultContainer" class="hidden space-y-4">
                <hr class="my-6">
                <h2 class="text-xl font-bold text-gray-800">قائمة الأرقام الجاهزة:</h2>
                <div id="linksList" class="space-y-3">
                    <!-- Links will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateList() {
            const message = encodeURIComponent(document.getElementById('feedbackMessage').value);
            const numbersText = document.getElementById('phoneNumbers').value;
            const container = document.getElementById('resultContainer');
            const list = document.getElementById('linksList');

            // Split numbers by new line and filter out empty lines
            const numbers = numbersText.split('\n').map(n => n.trim()).filter(n => n.length > 0);

            if (numbers.length === 0) {
                alert('يرجى إدخال رقم واحد على الأقل');
                return;
            }

            // Clear previous list
            list.innerHTML = '';
            container.classList.remove('hidden');

            numbers.forEach((num, index) => {
                // Remove any non-numeric characters just in case
                const cleanNum = num.replace(/\D/g, '');
                const url = `https://wa.me/${cleanNum}?text=${message}`;

                const item = document.createElement('div');
                item.className = "flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 hover:bg-white hover:shadow-md transition-all";
                
                item.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-sm text-gray-400">العميل #${index + 1}</span>
                        <span class="font-bold text-gray-700">${num}</span>
                    </div>
                    <a href="${url}" target="_blank" 
                       onclick="markAsSent(this)"
                       class="whatsapp-green text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:opacity-90">
                       <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                       إرسال
                    </a>
                `;
                list.appendChild(item);
            });
        }

        function markAsSent(element) {
            // Change color to show it was clicked
            element.classList.remove('whatsapp-green');
            element.classList.add('bg-gray-400');
            element.innerText = 'تم الإرسال ✓';
            
            // Optional: Move to next one automatically after a short delay
            // (Doesn't work for opening tabs but helps visual tracking)
        }
    </script>
</body>
</html>
